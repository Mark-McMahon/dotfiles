# ~/.config/tmux/tmux.conf

# --- Prefix: Ctrl+Space, fired by Karabiner Hyper+t ---
# tmux runs inside the terminal and only ever sees keystrokes, never the
# Karabiner hyper key. So the prefix is a real chord (Ctrl+Space), and
# Karabiner maps Hyper+t to send it. Day to day: press Hyper+t, then the
# command key (c, |, h/j/k/l, ...). Over SSH or on a machine without
# Karabiner, just press Ctrl+Space directly. Ctrl+Space is invisible
# plumbing you'll rarely type by hand; change it here if it ever conflicts.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Use vi-style keys in copy mode (this is "visual mode")
setw -g mode-keys vi

# vim-like visual selection in copy mode
# Enter copy mode with: prefix + [
#   v        -> start selection (visual mode)
#   C-v      -> toggle rectangle/block selection
#   y        -> yank (copy) selection to system clipboard and exit
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse support: drag to select, release copies to clipboard
set -g mouse on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Navigate panes, vim-style: prefix + h/j/k/l (i.e. Hyper+t then h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes, keeping the current directory: prefix + | (vertical) / - (horizontal)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resize panes, vim-style: prefix + H/J/K/L (i.e. Hyper+t then Shift+h/j/k/l).
# -r makes them repeatable: after the prefix, tap J J J to keep resizing.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config: prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
