# ~/.config/tmux/tmux.conf

# Use vi-style keys in copy mode (this is "visual mode")
setw -g mode-keys vi

# vim-like visual selection in copy mode
# Enter copy mode with: prefix + [
#   v        -> start selection (visual mode)
#   C-v      -> toggle rectangle/block selection
#   y        -> yank (copy) selection to system clipboard and exit
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse support: drag to select, release copies to clipboard
set -g mouse on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Reload config: prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
